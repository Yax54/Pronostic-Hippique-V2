publish_to: 'none'
version: 9.94.0+184

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: 6.1.5+1
  http: 1.5.0
  shared_preferences: 2.5.3
